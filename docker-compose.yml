services:
  limiter:
    image: ghcr.io/syvlech/remnawave-limiter:latest
    container_name: remnawave-limiter
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: valkey/valkey:8.1-alpine
    container_name: remnawave-limiter-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis-data:
